name: Update TAIFEX margin data

on:
  schedule:
    # 16:30 台灣時間 = 08:30 UTC，期交所通常下午公告隔一交易日保證金
    - cron: '30 8 * * 1-5'
  workflow_dispatch: {}
  repository_dispatch:
    types: [update-margin]

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Fetch latest margin data
        run: python scripts/fetch_margin.py

      - name: Commit if changed
        run: |
          if git diff --quiet -- margin-data.json; then
            echo "No change in margin-data.json"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add margin-data.json
          git commit -m "Update margin data ($(date -u +%Y-%m-%d))"
          git push
